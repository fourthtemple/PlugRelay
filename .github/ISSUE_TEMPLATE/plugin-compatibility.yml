name: Plugin compatibility report
description: Report a VST3, Audio Unit, or LV2 plugin compatibility issue with a PlugRelay probe report.
title: "[Plugin compatibility]: "
labels:
  - compatibility
body:
  - type: markdown
    attributes:
      value: |
        For plugin-specific support requests, please include a probe report. Do not upload plugin binaries, licenses, private presets, samples, or local filesystem paths.

        Generate a focused report with:

        ```sh
        PLUGRELAY_PROBE_REPORT=json \
        PLUGRELAY_PROBE_FORMATS=vst3 \
        PLUGRELAY_PROBE_FILTER="Plugin Name" \
        npm run --silent probe:installed > plugrelay-probe-report.json
        ```

        Use `PLUGRELAY_PROBE_FORMATS=au` for Audio Units or `PLUGRELAY_PROBE_FORMATS=lv2` for LV2.
  - type: input
    id: plugin_name
    attributes:
      label: Plugin name
      placeholder: Plugin Name
    validations:
      required: true
  - type: input
    id: vendor
    attributes:
      label: Plugin vendor
      placeholder: Plugin Vendor
    validations:
      required: true
  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      placeholder: 1.2.3
    validations:
      required: false
  - type: dropdown
    id: format
    attributes:
      label: Plugin format
      options:
        - VST3
        - Audio Unit
        - LV2
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS version
      placeholder: macOS 15.5
    validations:
      required: true
  - type: input
    id: architecture
    attributes:
      label: CPU architecture
      placeholder: Apple Silicon / Intel / x64 / arm64
    validations:
      required: true
  - type: input
    id: plugrelay_version
    attributes:
      label: PlugRelay commit or version
      placeholder: git rev-parse --short HEAD
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Probe command
      description: Paste the exact command you ran.
      render: sh
    validations:
      required: true
  - type: dropdown
    id: failing_area
    attributes:
      label: What failed?
      options:
        - scanning
        - instantiation
        - rendering
        - parameters
        - presets
        - VST3 program data
        - state save/restore
        - file grants
        - MIDI/events
        - transport
        - bus layouts
        - latency/tail
        - editor
        - discovery-only but should be hostable
        - other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: report
    attributes:
      label: Probe report or sanitized failure section
      description: Paste the JSON report, attach it as a file, or paste the sanitized failing phase.
      render: json
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not upload plugin binaries, license files, private presets, samples, sessions, or local filesystem paths.
          required: true
